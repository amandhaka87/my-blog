<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Dhaka | AI Voice Assistant</title>
    <!-- Master stylesheet connection to inherit all standard aesthetics seamlessly -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Jarvis UI Overrides extending Dark Mode Framework */
        .jarvis-container {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .chat-area {
            background-color: transparent;
            border-radius: 12px;
            padding: 2rem;
            min-height: 250px;
            margin: 2rem 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid transparent; 
        }

        .status {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .message {
            margin: 0.5rem 0;
            font-size: 1.15rem;
            line-height: 1.5;
        }

        .user-text {
            color: var(--text-muted);
        }

        .jarvis-text {
            color: #fff;
            font-weight: 500;
            margin-top: 1rem;
        }

        /* Minimalist Dark Mode Microphone Button */
        .mic-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .mic-button:hover {
            transform: scale(0.95);
            background-color: #e4e4e7;
        }

        .mic-button.listening {
            background-color: var(--accent);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            animation: breathe 2s ease-in-out infinite alternate;
        }

        .mic-button svg {
            width: 24px;
            height: 24px;
            fill: #000;
        }

        .mic-button.listening svg {
            fill: #fff;
        }

        @keyframes breathe {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- The exact header architecture from the blog -->
    <header>
        <a href="/" class="logo">AD</a>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="animate-fade-up jarvis-container">
            <h1>Jarvis Engine</h1>
            <p>A cloud-powered voice assistant seamlessly integrated into my portfolio.</p>

            <div class="post-card chat-area" id="chatArea">
                <div class="status" id="statusText">System Online</div>
                <div class="message user-text" id="userText">Tap the red microphone to speak...</div>
                <div class="message jarvis-text" id="jarvisText"></div>
            </div>

            <!-- The vibrant red icon logic -->
            <button class="mic-button" id="micBtn" onclick="toggleListening()">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
        </section>
    </main>

    <!-- Essential Footer inclusion -->
    <footer>
        &copy; 2026 Aman Dhaka. All rights reserved.
    </footer>

    <script>
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('statusText');
        const userText = document.getElementById('userText');
        const jarvisText = document.getElementById('jarvisText');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN';
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                statusText.innerText = 'Listening...';
                userText.innerText = 'Go ahead, I am listening...';
                jarvisText.innerText = '';
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                userText.innerText = `"${transcript}"`;
                await sendToJarvis(transcript);
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                statusText.innerText = 'Audio Error. Try again.';
                resetMic();
            };

            recognition.onend = () => {
                resetMic();
            };
        } else {
            statusText.innerText = "Speech Recognition not supported in this browser. Try Chrome/Edge.";
        }

        function resetMic() {
            isListening = false;
            micBtn.classList.remove('listening');
            if(statusText.innerText === 'Listening...') {
                statusText.innerText = 'Ready';
            }
        }

        function toggleListening() {
            if (!recognition) return;
            
            if (isListening) {
                recognition.stop();
            } else {
                window.speechSynthesis.cancel();
                recognition.start();
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google UK English Male') || v.name.includes('Google') || v.lang.startsWith('en-'));
            if(preferredVoice) utterance.voice = preferredVoice;

            window.speechSynthesis.speak(utterance);
        }

        async function sendToJarvis(text) {
            statusText.innerText = 'Thinking...';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                if(data.reply) {
                    jarvisText.innerText = data.reply;
                    statusText.innerText = 'Speaking';
                    speak(data.reply);
                } else {
                    throw new Error("Invalid reply");
                }
                
            } catch (err) {
                console.error(err);
                statusText.innerText = 'Disconnected';
                jarvisText.innerText = 'Could not reach the server. Is the API running?';
            }
        }
    </script>
</body>
</html>
